name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: Unit + DOM (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run install-leaflet
      - run: npm test

  e2e-pwa:
    name: E2E PWA (Playwright headless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run install-leaflet
      - run: npx playwright install chromium --with-deps
      - name: E2E (pwa-headless only — pwa-authenticated needs OAuth profile)
        run: npx playwright test --project pwa-headless
        env:
          CI: true
