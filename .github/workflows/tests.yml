# .github/workflows/tests.yml
# ─────────────────────────────────────────────────────────────────────────────
# CI Pinkin — refactor S9-ter.
#
# DEUX JOBS, DEUX DÉCLENCHEMENTS DISTINCTS.
#
#   - `unit` (vitest)  : lancé sur CHAQUE push main + pull_request.
#                        Rapide (~10 s côté runner GitHub), déterministe.
#                        C'est ce qui détermine le badge tests rouge/vert.
#
#   - `e2e`  (Playwright PWA headless) : lancé UNIQUEMENT sur
#                        `workflow_dispatch` (clic manuel dans l'UI Actions).
#                        Raison : les E2E PWA sont fragiles sur les runners
#                        GitHub mutualisés — les mêmes tests passent en local
#                        chez l'opérateur, échouent sur runners avec faible
#                        mémoire et webServer mono-threadé (cf. L11/L12 dans
#                        lecons-pinkin.md). Plutôt que de masquer (skip) ou
#                        de générer un faux signal rouge à chaque push, on
#                        sépare : qualité de la couche unit/DOM en feedback
#                        rapide, e2e à la demande.
#
# Pour lancer e2e manuellement :
#   GitHub repo → Actions → Tests workflow → Run workflow → Run.
# ─────────────────────────────────────────────────────────────────────────────

name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  unit:
    name: Unit & DOM (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm test

  e2e:
    name: E2E PWA (Playwright — manual)
    # Ne tourne QUE sur workflow_dispatch (déclenchement manuel UI Actions).
    # Cf. en-tête fichier pour la raison.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium
      - name: Run Playwright tests (pwa-headless project only)
        run: npx playwright test --project pwa-headless
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
