    <!-- Oreille gauche extérieur -->
    <ellipse cx="118" cy="118" rx="40" ry="36" fill="#C2185B"/>
    <!-- Oreille gauche intérieur -->
    <ellipse cx="118" cy="118" rx="24" ry="21" fill="#FCE4EC"/>

    <!-- Oreille droite extérieur -->
    <ellipse cx="282" cy="118" rx="40" ry="36" fill="#C2185B"/>
    <!-- Oreille droite intérieur -->
    <ellipse cx="282" cy="118" rx="24" ry="21" fill="#FCE4EC"/>

    <!-- Tête -->
    <circle cx="200" cy="200" r="98" fill="#C2185B"/>

    <!-- Museau -->
