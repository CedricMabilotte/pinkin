    <ellipse cx="17" cy="17" rx="8" ry="7" fill="#C2185B"/>
    <ellipse cx="17" cy="17" rx="5" ry="4" fill="#FCE4EC"/>
    <ellipse cx="47" cy="17" rx="8" ry="7" fill="#C2185B"/>
    <ellipse cx="47" cy="17" rx="5" ry="4" fill="#FCE4EC"/>
    <circle cx="32" cy="32" r="19" fill="#C2185B"/>
