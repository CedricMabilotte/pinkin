    <ellipse cx="22" cy="20" rx="6" ry="5.5" fill="#1A1A2E"/>
    <ellipse cx="58" cy="20" rx="10" ry="9" fill="#E91E8C"/>
    <ellipse cx="58" cy="20" rx="6" ry="5.5" fill="#1A1A2E"/>
    <circle cx="40" cy="40" r="22" fill="#E91E8C"/>
    <ellipse cx="40" cy="45" rx="10" ry="7.5" fill="#1A1A2E"/>
    <ellipse cx="40" cy="41" rx="4.5" ry="3.2" fill="#E91E8C" opacity="0.5"/>
