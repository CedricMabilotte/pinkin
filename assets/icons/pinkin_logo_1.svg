<svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">

  <!-- Background présentation -->
  <rect width="600" height="600" fill="#FDF6F0"/>

  <!-- === VERSION PRINCIPALE 400px === -->
  <g transform="translate(100,80)">

    <!-- Ombre douce -->
