    <circle cx="235" cy="180" r="11" fill="#1A1A2E"/>

    <!-- Reflets -->
    <circle cx="166" cy="175" r="4" fill="#FFFFFF"/>
    <circle cx="230" cy="175" r="4" fill="#FFFFFF"/>

    <!-- Sourire -->
    <path d="M186,233 Q200,244 214,233" fill="none" stroke="#C2185B" stroke-width="3" stroke-linecap="round"/>

    <!-- Attache badge -->
    <circle cx="308" cy="308" r="14" fill="none" stroke="#C2185B" stroke-width="4"/>
    <line x1="308" y1="322" x2="308" y2="348" stroke="#C2185B" stroke-width="4" stroke-linecap="round"/>

  </g>

